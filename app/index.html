<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inv-Man-Intake Browser Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.76.0/build/stlite.js"></script>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      stlite.mount(
        {
          entrypoint: "app/streamlit_app.py",
          requirements: ["streamlit==1.52.1"],
          files: {
            "app/streamlit_app.py": {
              url: "./streamlit_app.py"
            }
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
