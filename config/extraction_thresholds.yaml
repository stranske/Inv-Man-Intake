# v1 extraction threshold policy
field_auto_accept_min: 0.85
key_field_confidence_min: 0.75
document_key_field_coverage_min: 0.80
mandatory_field_min: 0.60
mandatory_fields:
  - terms.management_fee
  - performance.net_return_1y
  - operations.aum
document_profiles:
  pitchbook:
    key_fields:
      - terms.management_fee
      - performance.net_return_1y
      - operations.aum
    mandatory_fields:
      - terms.management_fee
      - performance.net_return_1y
      - operations.aum
  tear_sheet:
    key_fields:
      - performance.net_return_1y
      - operations.aum
    document_key_field_coverage_min: 1.0
    mandatory_fields:
      - operations.aum
  monthly_letter:
    key_fields:
      - performance.net_return_1y
      - commentary.market_update
    document_key_field_coverage_min: 0.5
    mandatory_fields:
      - performance.net_return_1y
  ddq:
    key_fields:
      - terms.management_fee
      - operations.aum
      - operations.inception_date
    mandatory_fields:
      - terms.management_fee
      - operations.aum
