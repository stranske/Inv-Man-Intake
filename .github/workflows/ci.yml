# Thin caller for Python CI - delegates to Workflows repo reusable workflow
# No local scripts required - all logic is centralized in stranske/Workflows
#
# This workflow runs:
# - Lint (Ruff)
# - Format check (Black)
# - Type checking (mypy)
# - Tests (pytest) on Python 3.12 and 3.13
#
# NOTE: Do NOT add a top-level 'permissions:' block here. It causes
# startup_failure when calling reusable workflows. The reusable workflow
# defines its own permissions.
#
# Copy this file to: .github/workflows/ci.yml
# Also copy: autofix-versions.env to .github/workflows/autofix-versions.env
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python CI
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      typecheck: true
      coverage: true
      coverage-min: '80'
    secrets: inherit

  observability-smoke:
    name: Observability Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Validate observability setup syntax
        env:
          LANGSMITH_API_KEY: lsv2_pt_ci_smoke_key
          LANGSMITH_PROJECT: inv-man-intake-ci-smoke
          LANGCHAIN_TRACING_V2: "true"
          INV_MAN_TRACING_ENABLED: "true"
        run: python -m inv_man_intake.observability.setup_validation --require-project

      - name: Run observability smoke test target
        run: pytest -q tests/observability/test_setup_validation.py tests/observability/test_tracing_toggle.py --no-cov
